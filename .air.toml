root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/agentos ./cmd/agentos"
bin = "./tmp/agentos"
full_bin = "./tmp/agentos --config configs/agentos.yaml"
include_ext = ["go", "yaml", "yml", "html"]
exclude_dir = ["tmp", "bin", "plugins", ".git"]
delay = 500
stop_on_error = true

[screen]
clear_on_rebuild = true
