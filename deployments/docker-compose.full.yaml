version: "3.9"

# AgentOS Full Stack — Docker Compose
#
# Starts:
#   - agentos     — AgentOS Control Plane + Edge proxy (:8080, :8081, :8443, :8444)
#   - jaeger      — All-in-one Jaeger with OTLP receiver (:16686 UI, :4317 OTLP gRPC)
#   - prometheus  — Metrics scraper (:9090)
#   - grafana     — Dashboard UI (:3000)
#
# Quick start:
#   docker compose -f deployments/docker-compose.full.yaml up
#
# Open:
#   AgentOS Gateway:      http://localhost:8080
#   AgentOS Observatory:  http://localhost:8081
#   AgentOS Edge (TLS):   https://localhost:8443
#   Jaeger UI:            http://localhost:16686
#   Prometheus:           http://localhost:9090
#   Grafana:              http://localhost:3000 (admin/admin)

services:
  agentos:
    build:
      context: ..
      dockerfile: Dockerfile
    image: agentos:latest
    container_name: agentos
    restart: unless-stopped
    ports:
      - "8080:8080"   # AgentOS Control Plane (gateway)
      - "8081:8081"   # AgentOS Observatory (admin)
      - "8443:8443"   # AgentOS Edge (TLS)
      - "8444:8444"   # AgentOS Edge (H2C)
    volumes:
      - ../configs/agentos.yaml:/etc/agentos/agentos.yaml:ro
    environment:
      - AGENTOS_CONFIG=/etc/agentos/agentos.yaml
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      jaeger:
        condition: service_healthy
    networks:
      - agentOS

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC (Jaeger receives spans from AgentOS)
      - "4318:4318"    # OTLP HTTP
      - "14268:14268"  # Jaeger HTTP collector (legacy, kept for compatibility)
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=memory
      - MEMORY_MAX_TRACES=10000
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:14269/"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - agentOS

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../deployments/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    networks:
      - agentOS

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/agentos-edge.json
    volumes:
      - ../deployments/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ../deployments/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - agentOS

networks:
  agentOS:
    driver: bridge
