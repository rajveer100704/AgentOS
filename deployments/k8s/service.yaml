apiVersion: v1
kind: Service
metadata:
  name: agentos
  namespace: default
  labels:
    app: agentos
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: gateway
    - port: 8081
      targetPort: 8081
      name: admin
    - port: 8443
      targetPort: 8443
      name: edge-tls
    - port: 8444
      targetPort: 8444
      name: edge-h2c
  selector:
    app: agentos
---
apiVersion: v1
kind: Service
metadata:
  name: agentos-edge-external
  namespace: default
  labels:
    app: agentos
spec:
  type: LoadBalancer
  ports:
    - port: 443
      targetPort: 8443
      name: edge-tls
    - port: 80
      targetPort: 8444
      name: edge-h2c
  selector:
    app: agentos
