apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentos
  namespace: default
  labels:
    app: agentos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agentos
  template:
    metadata:
      labels:
        app: agentos
    spec:
      containers:
        - name: agentos
          image: agentos:latest
          imagePullPolicy: IfNotPresent
          args: ["--config", "/etc/agentos/agentos.yaml"]
          ports:
            - containerPort: 8080
              name: gateway
            - containerPort: 8081
              name: admin
            - containerPort: 8443
              name: edge-tls
            - containerPort: 8444
              name: edge-h2c
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          volumeMounts:
            - name: config-volume
              mountPath: /etc/agentos
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: config-volume
          configMap:
            name: agentos-config
