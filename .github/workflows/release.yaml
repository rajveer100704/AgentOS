name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o agentos-linux-amd64 ./cmd/agentos
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o agentos-linux-arm64 ./cmd/agentos
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o agentos-darwin-arm64 ./cmd/agentos
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o agentos-darwin-amd64 ./cmd/agentos

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            agentos-linux-amd64
            agentos-linux-arm64
            agentos-darwin-arm64
            agentos-darwin-amd64
          generate_release_notes: true
