apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-AgentOS
  labels:
    app: AgentOS
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: AgentOS
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: AgentOS
        release: {{ .Release.Name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: AgentOS
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config
            - /app/configs/AgentOS.yaml
          ports:
            - name: gateway
              containerPort: {{ .Values.service.gatewayPort }}
              protocol: TCP
            - name: admin
              containerPort: {{ .Values.service.adminPort }}
              protocol: TCP
            - name: mcp
              containerPort: {{ .Values.service.mcpPort }}
              protocol: TCP
          env:
            {{- if .Values.postgresql.enabled }}
            - name: AgentOS_DB_HOST
              value: {{ .Values.postgresql.host | quote }}
            - name: AgentOS_DB_PORT
              value: {{ .Values.postgresql.port | quote }}
            - name: AgentOS_DB_USER
              value: {{ .Values.postgresql.user | quote }}
            - name: AgentOS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-db-secret
                  key: password
            - name: AgentOS_DB_NAME
              value: {{ .Values.postgresql.database | quote }}
            {{- end }}
            {{- if .Values.redis.enabled }}
            - name: AgentOS_REDIS_URL
              value: {{ .Values.redis.url | quote }}
            {{- end }}
          {{- if .Values.healthcheck.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.healthcheck.path }}
              port: gateway
            initialDelaySeconds: {{ .Values.healthcheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthcheck.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthcheck.path }}
              port: gateway
            initialDelaySeconds: {{ .Values.healthcheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthcheck.periodSeconds }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/configs
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-config
